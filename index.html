<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Store</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Pacifico&display=swap" rel="stylesheet">
</head>

<body>

<header>
  <div class="logo">Pet Toy City</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">About Us</a>
    <a href="#">Contact</a>
    <a href="#cart">Cart</a>
  </nav>
</header>

<section class="banner">
  <img src="images/banner.jpg" alt="Pet Toys Banner">
  <h1 class="banner-text">WELCOME</h1>
</section>

<main>

<h2>Hot Toys</h2>

<div class="products">

  <!-- Product 1 -->
  <div class="product">
    <img src="images/toy1.jpg" alt="Pet Ball">
    <h3>Pet Ball</h3>
    <p>Price: ¥50</p>
    <button onclick="addToCart('Pet Ball', 50)">Add to Cart</button>
  </div>

  <!-- Product 2 -->
  <div class="product">
    <img src="images/toy2.jpg" alt="Pet Bite Toy">
    <h3>Pet Bite Toy</h3>
    <p>Price: ¥30</p>
    <button onclick="addToCart('Pet Bite Toy', 30)">Add to Cart</button>
  </div>

</div>

<!-- Shopping Cart Section -->
<section id="cart">
<h2>Shopping Cart</h2>
<div id="cart-items">
  <p>Your cart is empty.</p>
</div>
<p id="cart-total"></p>
</section>

<footer>
  <p>© 2026 Pet Toy City | Contact: 888-559-56</p>
</footer>

<script src="js/main.js"></script>
</body>
</html>
