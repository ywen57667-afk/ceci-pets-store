<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pets store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="logo">Pets Store</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">About us</a>
        <a href="#">Contact us</a>
    </nav>
</header>

<section class="banner">
    <img src="images/banner.jpg" alt="Pets Toys">
</section>

<main>
    <h2>Hot Toys</h2>
    <div class="products">
        <!-- Product 1 -->
        <div class="product">
            <img src="images/toy1.jpg" alt="Pets Ball">
            <h3>Pets Ball</h3>
            <p>Price：¥50</p>
            <button onclick="buy(' Pets Ball')">Buy</button>
            <a href="https://qr.alipay.com/fkx12345abc" target="_blank" class="pay-btn">支付宝支付</a>
        </div>
        <!-- Product 2 -->
        <div class="product">
            <img src="images/toy2.jpg" alt="Pet Bite Bite">
            <h3>Pet Bite Bite</h3>
            <p>Price：¥30</p>
            <button onclick="buy('Pet Bite Bite')">Buy</button>
            <a href="https://qr.alipay.com/fkx67890xyz" target="_blank" class="pay-btn">Alipay</a>
        </div>
    </div>
</main>

<footer>
    <p>© 2026 Pet Toy City | Contects: 888-559-56</p>
</footer>

<script src="js/main.js"></script>
</body>
</html>
