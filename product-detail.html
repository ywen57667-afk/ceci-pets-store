<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting | sweet-pet-shop</title>
<meta http-equiv="refresh" content="0; url=index.html?detail=pet-ball">
<script>
  const params = new URLSearchParams(window.location.search);
  const product = params.get('product') || 'pet-ball';
  window.location.replace(`index.html?detail=${encodeURIComponent(product)}`);
</script>
</head>
<body>
  <p>Redirecting to product details...</p>
</body>
</html>
